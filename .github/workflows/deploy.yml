name: Build and Deploy to S3

on:
  push:
    branches:
      - main

# CRITICAL: OIDC needs permission to request the token
permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    # Step 3: Install dependencies using standard install instead of strict ci
    - name: Install Dependencies
      run: npm install

    - name: Build Application
      run: npm run build

    # Configure AWS using temporary OIDC tokens
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
        aws-region: us-east-1 # Your S3 region

    - name: Deploy to S3 Bucket
      run: |
        aws s3 sync build/ s3://${{ secrets.AWS_S3_BUCKET_NAME }} --delete